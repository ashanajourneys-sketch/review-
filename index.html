<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ashana Journeys — Submit a Review</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,900&family=DM+Sans:wght@200;300;400;500&display=swap" rel="stylesheet"/>
  
  <style>
    :root {
      --forest-ink:  #07080c;
      --forest-mid:  #20232b;
      --cream:       #f0ebe0;
      --gold:        #c9952b;
      --gold-hi:     #e2aa3a;
      --ink-mid:     rgba(240,235,224,0.52);
      --glass:       rgba(12,14,20,0.52);
      --glass-border:rgba(255,255,255,0.09);
      --serif: 'Playfair Display', Georgia, serif;
      --sans:  'DM Sans', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--sans); background: var(--forest-ink); color: var(--cream); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1.5rem; }
    .review-box { background: var(--forest-mid); border: 1px solid var(--glass-border); border-radius: 24px; width: 100%; max-width: 500px; padding: 2.5rem 2rem; box-shadow: 0 24px 60px rgba(0,0,0,0.5); }
    .header { text-align: center; margin-bottom: 2rem; }
    .title { font-family: var(--serif); font-size: 2rem; font-weight: 900; color: var(--cream); margin-bottom: .5rem; line-height: 1.1; }
    .title em { color: var(--gold); font-style: italic; }
    .sub { font-size: .88rem; font-weight: 300; color: var(--ink-mid); }
    .group { margin-bottom: 1.2rem; }
    .group label { display: block; font-size: .65rem; letter-spacing: .14em; text-transform: uppercase; color: rgba(240,235,224,0.38); margin-bottom: .4rem; }
    .group input, .group textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--cream); padding: .8rem 1rem; border-radius: 10px; font-family: var(--sans); font-size: max(.85rem,15px); outline: none; transition: border-color .25s; }
    .group input:focus, .group textarea:focus { border-color: var(--gold); }
    .group textarea { resize: vertical; min-height: 100px; }
    .err { color: #ff7575; font-size: .75rem; min-height: 1rem; margin-bottom: .5rem; text-align: center; }
    .submit-btn { width: 100%; padding: 1rem; border-radius: 12px; border: none; background: var(--gold); color: var(--forest-ink); font-family: var(--sans); font-weight: 700; font-size: max(.82rem,15px); letter-spacing: .1em; text-transform: uppercase; cursor: pointer; transition: background .3s ease; }
    .submit-btn:hover:not(:disabled) { background: var(--gold-hi); }
    .submit-btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .success-msg { display: none; text-align: center; padding: 2rem 0; }
    .success-msg h3 { font-family: var(--serif); font-size: 1.6rem; color: var(--gold); margin-bottom: .5rem; }
    .success-msg p { font-size: .9rem; color: var(--ink-mid); line-height: 1.6; }
  </style>
</head>
<body>

  <div class="review-box" id="form-container">
    <div class="header">
      <h1 class="title">Share Your <em>Experience</em></h1>
      <p class="sub">How was your adventure with Ashana Journeys?</p>
    </div>
    
    <div class="group">
      <label>Your Name *</label>
      <input type="text" id="rv-name" placeholder="Enter your name"/>
    </div>
    <div class="group">
      <label>Date / Trip (Optional)</label>
      <input type="text" id="rv-date" placeholder="e.g. March 2026, Mount Kinabalu"/>
    </div>
    <div class="group">
      <label>Your Review *</label>
      <textarea id="rv-msg" placeholder="Tell us about your trip..."></textarea>
    </div>
    
    <div class="err" id="rv-err"></div>
    <button class="submit-btn" id="rv-submit" onclick="submitReview()">Submit Review ✦</button>
  </div>

  <div class="review-box success-msg" id="success-container">
    <h3>Thank You!</h3>
    <p>Your review has been submitted successfully and is pending approval from our team.</p>
    <a href="index.html" style="display:inline-block; margin-top:1.5rem; color:var(--gold); font-size:.85rem; text-decoration:none; text-transform:uppercase; letter-spacing:.1em;">← Back to Home</a>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAvMTGPX1NRdDWfBJVTwKFu1MX1-Junq7Y",
    authDomain: "ashana-journeys.firebaseapp.com",
    projectId: "ashana-journeys",
    storageBucket: "ashana-journeys.firebasestorage.app",
    messagingSenderId: "1056206455125",
    appId: "1:1056206455125:web:5e09ea23b28847dff06fdc"
  };
  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  window.submitReview = async () => {
    const name = document.getElementById('rv-name').value.trim();
    const date = document.getElementById('rv-date').value.trim();
    const msg  = document.getElementById('rv-msg').value.trim();
    const err  = document.getElementById('rv-err');
    const btn  = document.getElementById('rv-submit');

    if (!name || !msg) { err.textContent = 'Name and Review are required.'; return; }
    err.textContent = '';
    
    btn.textContent = 'Submitting...';
    btn.disabled = true;

    try {
      // Writing to a 'pending_reviews' collection so admin can approve it first
      await addDoc(collection(db, 'pending_reviews'), {
        name: name,
        date: date,
        message: msg,
        submittedAt: serverTimestamp()
      });
      document.getElementById('form-container').style.display = 'none';
      document.getElementById('success-container').style.display = 'block';
    } catch(e) {
      console.error(e);
      err.textContent = 'Failed to submit review. Please try again.';
      btn.textContent = 'Submit Review ✦';
      btn.disabled = false;
    }
  };
</script>
</body>
</html>
